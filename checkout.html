<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - ShopEase</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { "primary": "#137fec", "background-light": "#f6f7f8", "background-dark": "#101922" },
                fontFamily: { "display": ["Inter"] },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
        },
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Navigation -->
<div id="navbar-placeholder"></div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <nav class="flex items-center gap-2 text-sm text-slate-500 mb-8">
    <a class="hover:text-primary" href="index.html">Home</a>
    <span class="material-symbols-outlined text-xs">chevron_right</span>
    <a class="hover:text-primary" href="cart.html">Cart</a>
    <span class="material-symbols-outlined text-xs text-slate-900">chevron_right</span>
    <span class="text-slate-900 dark:text-slate-100 font-semibold">Checkout</span>
  </nav>
  <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Secure Checkout</h2>

  <div id="checkout-loading" class="flex items-center justify-center py-20">
    <span class="material-symbols-outlined text-primary text-5xl animate-spin">sync</span>
  </div>
  <div id="checkout-empty" class="hidden text-center py-20">
    <span class="material-symbols-outlined text-5xl text-slate-300">shopping_cart</span>
    <p class="mt-4 text-lg text-slate-500">Your cart is empty. <a href="products.html" class="text-primary font-bold">Shop now</a></p>
  </div>

  <div id="checkout-content" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12">
    <!-- Left Column -->
    <div class="lg:col-span-8 space-y-8 md:space-y-10">
      <!-- Shipping -->
      <section>
        <div class="flex items-center gap-3 mb-4 md:mb-6">
          <span class="bg-primary/10 text-primary w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">1</span>
          <h3 class="text-lg md:text-xl font-bold">Shipping Address</h3>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 bg-white dark:bg-slate-900 p-4 md:p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
          <div class="flex flex-col gap-1 md:gap-2">
            <label class="text-xs md:text-sm font-semibold text-slate-700 dark:text-slate-300">First Name</label>
            <input id="first-name" class="rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 text-sm md:text-base" placeholder="John" type="text"/>
          </div>
          <div class="flex flex-col gap-1 md:gap-2">
            <label class="text-xs md:text-sm font-semibold text-slate-700 dark:text-slate-300">Last Name</label>
            <input id="last-name" class="rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 text-sm md:text-base" placeholder="Doe" type="text"/>
          </div>
          <div class="flex flex-col gap-1 md:gap-2 md:col-span-2">
            <label class="text-xs md:text-sm font-semibold text-slate-700 dark:text-slate-300">Street Address</label>
            <input id="address" class="rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 text-sm md:text-base" placeholder="123 Shopping Avenue" type="text"/>
          </div>
          <div class="flex flex-col gap-1 md:gap-2">
            <label class="text-xs md:text-sm font-semibold text-slate-700 dark:text-slate-300">City</label>
            <input id="city" class="rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 text-sm md:text-base" placeholder="New York" type="text"/>
          </div>
          <div class="flex flex-col gap-1 md:gap-2">
            <label class="text-xs md:text-sm font-semibold text-slate-700 dark:text-slate-300">Zip / Postal Code</label>
            <input id="zip" class="rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 text-sm md:text-base" placeholder="10001" type="text"/>
          </div>
        </div>
      </section>

      <!-- Payment -->
      <section>
        <div class="flex items-center gap-3 mb-4 md:mb-6">
          <span class="bg-primary/10 text-primary w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">2</span>
          <h3 class="text-lg md:text-xl font-bold">Payment Method</h3>
        </div>
        <div class="bg-white dark:bg-slate-900 p-4 md:p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-4 md:space-y-6">
          <div class="flex flex-col sm:flex-row gap-3 md:gap-4">
            <label class="flex-1 flex items-center justify-between p-3 md:p-4 border-2 border-primary rounded-xl cursor-pointer bg-primary/5">
              <div class="flex items-center gap-2 md:gap-3">
          <!-- Payment Selection -->
          <div class="space-y-4">
              <h3 class="text-xs font-black uppercase tracking-[0.2em] text-primary mb-6">Payment Method</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <label class="payment-method-label cursor-pointer relative">
                      <input type="radio" name="payment_method" value="credit_card" checked class="peer sr-only">
                      <div class="p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 transition-all">
                          <div class="flex items-center gap-3">
                              <span class="material-symbols-outlined text-slate-400 peer-checked:text-primary">credit_card</span>
                              <span class="font-bold text-sm">Credit Card</span>
                          </div>
                      </div>
                  </label>
                  <label class="payment-method-label cursor-pointer relative">
                      <input type="radio" name="payment_method" value="cod" class="peer sr-only">
                      <div class="p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 transition-all">
                          <div class="flex items-center gap-3">
                              <span class="material-symbols-outlined text-slate-400 peer-checked:text-primary">payments</span>
                              <span class="font-bold text-sm">Cash on Delivery</span>
                          </div>
                      </div>
                  </label>
              </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
            <div class="flex flex-col gap-1 md:gap-2 md:col-span-2">
              <label class="text-xs md:text-sm font-semibold text-slate-700 dark:text-slate-300">Card Number</label>
              <div class="relative">
                <input id="card-number" class="w-full rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 pl-12 text-sm md:text-base" placeholder="0000 0000 0000 0000" type="text"/>
                <span class="material-symbols-outlined absolute left-4 top-3 text-slate-400">payments</span>
              </div>
            </div>
            <div class="flex flex-col gap-1 md:gap-2">
              <label class="text-xs md:text-sm font-semibold text-slate-700 dark:text-slate-300">Expiry Date</label>
              <input id="expiry" class="rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 text-sm md:text-base" placeholder="MM/YY" type="text"/>
            </div>
            <div class="flex flex-col gap-1 md:gap-2">
              <label class="text-xs md:text-sm font-semibold text-slate-700 dark:text-slate-300">CVV</label>
              <input id="cvv" class="rounded-lg border-slate-200 dark:border-slate-700 dark:bg-slate-800 focus:border-primary focus:ring-primary h-12 text-sm md:text-base" placeholder="123" type="text"/>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- Order Summary -->
    <div class="lg:col-span-4">
      <div class="sticky top-24 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-md p-6">
        <h3 class="text-lg md:text-xl font-bold mb-6 border-b border-slate-100 dark:border-slate-800 pb-4">Order Summary</h3>
        <div id="order-items" class="space-y-4 mb-6 max-h-[300px] overflow-y-auto pr-2"></div>
        <div class="space-y-3 pt-6 border-t border-slate-100 dark:border-slate-800">
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Subtotal</span>
            <span id="summary-subtotal" class="font-semibold">$0.00</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Shipping</span>
            <span class="text-green-600 font-semibold">Free</span>
          </div>
          <div class="flex justify-between text-lg md:text-xl font-extrabold pt-3 mt-3 border-t-2 border-dashed border-slate-100 dark:border-slate-800">
            <span>Total</span>
            <span id="summary-total" class="text-primary">$0.00</span>
          </div>
        </div>
        <button id="place-order-btn" onclick="placeOrder()" class="w-full py-4 bg-primary text-white rounded-xl font-bold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all hover:-translate-y-1 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
            Place Order
        </button>
        <p class="text-center text-[10px] md:text-xs text-slate-400 mt-4 flex items-center justify-center gap-1">
          <span class="material-symbols-outlined text-[14px]">verified_user</span>SSL Encrypted Checkout
        </p>
      </div>
    </div>
  </div>
</main>

<!-- Footer -->
<div id="footer-placeholder"></div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/auth.js"></script>
<script src="js/checkout.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initPage(async () => {
        await loadCheckoutSummary();
    });
  });

  async function loadCheckoutSummary() {
    const empty = document.getElementById('checkout-empty');
    const content = document.getElementById('checkout-content');

    try {
      showLoader();
      const res = await api.get('/api/cart');
      const cart = res.data?.cart || res.cart;
      const items = cart?.items || [];

      if (!items || items.length === 0) { 
          document.getElementById('checkout-loading').classList.add('hidden');
          router.navigate('cart.html');
          return; 
      }

      document.getElementById('checkout-loading').classList.add('hidden');

      content.classList.remove('hidden');

      let subtotal = 0;
      document.getElementById('order-items').innerHTML = items.map(item => {
        const price = item.price || 0;
        const qty = item.quantity || 1;
        subtotal += price * qty;
        return `<div class="flex gap-4">
          <div class="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-lg overflow-hidden flex-shrink-0">
            <img class="w-full h-full object-cover" src="${item.image_url || 'https://placehold.co/64x64/e2e8f0/94a3b8?text=P'}" alt="${item.name || 'Product'}"/>
          </div>
          <div class="flex-1">
            <p class="text-sm font-bold truncate">${item.name || 'Product'}</p>
            <p class="text-xs text-slate-500">Qty: ${qty}</p>
            <p class="text-sm font-bold text-primary mt-1">$${(price * qty).toFixed(2)}</p>
          </div>
        </div>`;
      }).join('');

      document.getElementById('summary-subtotal').textContent = '$' + subtotal.toFixed(2);
      document.getElementById('summary-total').textContent = '$' + subtotal.toFixed(2);
    } catch (err) {
      if (err.status === 401) router.navigate('login.html', { redirect: 'checkout.html' });
      else showToast('Could not load cart data.', 'error');
    } finally {
      hideLoader();
      const loader = document.getElementById('checkout-loading');
      if (loader) loader.classList.add('hidden');
    }
  }

  async function placeOrder() {
    const btn = document.getElementById('place-order-btn');
    const firstName = document.getElementById('first-name').value.trim();
    const lastName = document.getElementById('last-name').value.trim();
    const address = document.getElementById('address').value.trim();

    if (!firstName || !lastName || !address) {
      showToast('Please fill in all required shipping fields.', 'error');
      return;
    }

    const paymentMethod = document.querySelector('input[name="payment_method"]:checked')?.value || 'credit_card';
        
    try {
        btn.disabled = true;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Processing...';
        showLoader();
        
        // Collect any additional fields if needed
        const orderData = {
            shipping_address: { 
                name: firstName + ' ' + lastName, 
                address, 
                city: document.getElementById('city').value, 
                zip: document.getElementById('zip').value 
            },
            payment_method: paymentMethod
        };

        const response = await api.checkout(orderData);
        const orderId = response.data?.order?._id || response.data?.order?.id || response.order_id;

        if (response.success) {
            showToast('Order placed successfully!', 'success');
            btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Order Placed!';
            setTimeout(() => router.navigate('order-success.html', { orderId: orderId }), 1000);
        } else {
            showToast(response.error || 'Checkout failed', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Place Order';
        }
    } catch (error) {
        console.error('Checkout error:', error);
        showToast(error.message || 'Could not place order', 'error');
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined">lock</span> Place Order';
    } finally {
        hideLoader();
        const loader = document.getElementById('checkout-loading');
        if (loader) loader.classList.add('hidden');
    }
  }
</script>
</body></html>
