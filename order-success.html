<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Success - ShopEase</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { primary: "#137fec", "background-dark": "#101922" },
                fontFamily: { display: ["Inter", "sans-serif"] },
            },
        },
    };
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
    .hidden { display: none !important; }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

<!-- Navigation -->
<div id="navbar-placeholder"></div>

<main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full text-center space-y-8 animate-in fade-in zoom-in duration-500">
        <div class="flex flex-col items-center">
            <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mb-6">
                <span class="material-icons text-green-500 text-4xl">check_circle</span>
            </div>
            <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">Order Confirmed!</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Thank you for your purchase. Your order has been placed successfully.</p>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-2xl border border-primary/10 p-6 shadow-sm text-left">
            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-4">Order Summary</h3>
            <div class="space-y-3">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Order ID</span>
                    <span id="order-id-display" class="font-mono font-bold text-primary">#—</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Status</span>
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-bold bg-blue-100 text-blue-700">PROCESSING</span>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <button onclick="router.navigate('profile.html')" class="w-full py-4 bg-primary text-white rounded-xl font-bold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all">
                View My Orders
            </button>
            <button onclick="router.navigate('index.html')" class="w-full py-4 text-slate-600 dark:text-slate-400 font-bold hover:text-primary transition-colors">
                Continue Shopping
            </button>
        </div>
    </div>
</main>

<!-- Footer -->
<div id="footer-placeholder"></div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        initPage(async () => {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('orderId');
            
            if (orderId) {
                document.getElementById('order-id-display').textContent = `#${orderId.slice(-8).toUpperCase()}`;
            } else {
                // If accessed directly without order ID, maybe redirect?
                // For now just show "N/A"
                document.getElementById('order-id-display').textContent = '#N/A';
            }
        });
    });
</script>
</body>
</html>
